<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0a6"/>
      <stop offset="40%" stop-color="#f0cf67"/>
      <stop offset="70%" stop-color="#c88f2d"/>
      <stop offset="100%" stop-color="#7d4f12"/>
    </linearGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="16" cy="16" r="15" fill="black"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- inner circle -->
  <circle cx="16" cy="16" r="11" fill="#0b0b0b"/>

  <!-- XD symbol -->
  <text x="50%" y="55%" font-size="14" font-family="Arial, sans-serif"
        fill="url(#gold)" text-anchor="middle" dominant-baseline="middle"
        font-weight="bold">
    XD
  </text>
</svg>
